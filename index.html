  h1{font-size:22px;margin:2px 0 0;font-weight:700}
  .range{font-size:12px;color:var(--muted)}
  nav.tabs{display:flex;flex-wrap:wrap;gap:2px;margin:14px 0 18px;border-bottom:1px solid var(--line)}

  nav.tabs button:hover{color:var(--ink)}
  nav.tabs button.active{color:var(--ink);border-bottom-color:var(--gold)}
  .panel{display:none}
  .panel.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .grid{display:grid;gap:14px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
  .kpi .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600}
  .kpi .val{font-size:26px;font-weight:700;margin-top:4px}
  .kpi .sub{font-size:12px;margin-top:3px}
  .up{color:var(--pos)} .down{color:var(--neg)} .flat{color:var(--muted)}
  .sec-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink);margin:22px 0 8px}
  .note{font-size:12px;color:var(--muted);background:#fbf6ec;border:1px solid var(--gold-soft);border-radius:8px;padding:10px 12px;margin:8px 0}
  .chart-box{position:relative;height:300px}
  .chart-box.short{height:240px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px}
  .pill.email{background:#e8f0f7;color:var(--email)} .pill.sms{background:#e6f1ea;color:var(--sms)}
  .pill.low{background:#fbe9e4;color:var(--neg)} .pill.ok{background:#e6f1ea;color:var(--pos)}
  .two{grid-template-columns:1fr 1fr}
  @media(max-width:720px){.two{grid-template-columns:1fr}}
  .loading{color:var(--muted);font-size:13px;padding:30px;text-align:center}
  .err{color:var(--neg);font-size:12px;padding:8px 0}
  .empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
  .empty-state .big{font-size:34px;margin-bottom:8px}
  .src{font-size:11px;color:var(--muted);margin-top:6px;font-style:italic}
  ul.clean{margin:6px 0 0;padding-left:18px;font-size:13px;color:var(--muted)}
  ul.clean li{margin:3px 0}
</style>

/* ---------- date helpers (Chicago local) ---------- */
function chiToday(){ return new Date().toLocaleDateString("en-CA",{timeZone:TZ}); } // YYYY-MM-DD
function addDays(iso,n){ const d=new Date(iso+"T12:00:00Z"); d.setUTCDate(d.getUTCDate()+n); return d.toISOString().slice(0,10); }
function fmtNice(iso){ const d=new Date(iso+"T12:00:00Z"); return d.toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
let TODAY, WK_START, PREV_START;

/* sum a measurement array over buckets whose date falls in [s,e) */
function sumWindow(dates, arr, s, e){
  let t=0; for(let i=0;i<dates.length;i++){ const d=dates[i].slice(0,10); if(d>=s && d<e) t+=(arr[i]||0); } return t;
}
function deltaHtml(cur, prev, money){
  if(prev===0 && cur===0) return '<span class="sub flat">no change vs last wk</span>';
  if(prev===0) return '<span class="sub up">▲ new vs last wk</span>';
  const d=(cur-prev)/prev; const cls=d>0.001?"up":(d<-0.001?"down":"flat"); const ar=d>0.001?"▲":(d<-0.001?"▼":"–");
  return '<span class="sub '+cls+'">'+ar+' '+Math.abs(d*100).toFixed(0)+'% vs last wk</span>';
}

/* ---------- state ---------- */
const S = {}; const charts={}; const built={};

/* ---------- static init ---------- */
function initStatic(){
  const ser = DATA.series||{};
  S.placedDay=ser.placedDay; S.placedHr=ser.placedHr; S.refundDay=ser.refundDay;
  S.emailSub=ser.emailSub; S.smsSub=ser.smsSub;
  S.campaigns=ser.campaigns; S.flows=ser.flows; S.products=ser.products;
  TODAY=DATA.meta.today; WK_START=DATA.meta.wkStart; PREV_START=DATA.meta.prevStart;
  document.getElementById("rangeLabel").innerHTML =
    "Week of "+fmtNice(WK_START)+" \u2013 "+fmtNice(addDays(TODAY,-1))
    +" &nbsp;\u00b7&nbsp; <span style='color:var(--gold)'>snapshot generated "+DATA.meta.generatedAt+"</span>";
  renderTab("overview");
}


/* ---------- derived ---------- */
function placedWeek(){
  const a=S.placedDay; if(!a||a.err) return null;
  const rev=a.m.sum_value||[], ord=a.m.count||[];
  return {
    revCur:sumWindow(a.dates,rev,WK_START,TODAY), revPrev:sumWindow(a.dates,rev,PREV_START,WK_START),
    ordCur:sumWindow(a.dates,ord,WK_START,TODAY), ordPrev:sumWindow(a.dates,ord,PREV_START,WK_START)
  };
}
function channelTotals(){
  // aggregate campaign results by channel + flow aggregation by channel
  const out={email:{rev:0,conv:0,recip:0,opens:0,clicks:0,deliv:0,unsub:0},
             sms:{rev:0,conv:0,recip:0,opens:0,clicks:0,deliv:0,unsub:0}};
  const addRes=(arr)=>{ if(!arr) return; arr.forEach(r=>{ const ch=(r.groupings&&r.groupings.send_channel)||"email"; const o=out[ch]; if(!o) return;
    const s=r.statistics||{}; o.rev+=s.conversion_value||0; o.conv+=s.conversions||0; o.recip+=s.recipients||0;
    o.opens+=s.opens_unique||0; o.clicks+=s.clicks_unique||0; o.deliv+=s.delivered||0; o.unsub+=s.unsubscribe_uniques||0; }); };
  if(S.campaigns && !S.campaigns.err) addRes(S.campaigns.data && S.campaigns.data.attributes && S.campaigns.data.attributes.results);
  if(S.flows && !S.flows.err) addRes(S.flows.data && S.flows.data.attributes && S.flows.data.attributes.results);
  return out;
}

/* ---------- renderers ---------- */
function mkCard(label,val,subHtml){ return '<div class="card kpi"><div class="label">'+label+'</div><div class="val">'+val+'</div>'+(subHtml||"")+'</div>'; }
function chart(id,cfg){ if(charts[id]) charts[id].destroy(); const el=document.getElementById(id); if(el) charts[id]=new Chart(el,cfg); }
Chart.defaults.font.family=getComputedStyle(document.body).fontFamily;
Chart.defaults.color="#6b7280";
Chart.defaults.plugins.legend.labels.boxWidth=12;

function renderOverview(){
  const el=document.getElementById("p-overview");
  const w=placedWeek();
  if(!w){ el.innerHTML='<div class="err">Revenue data unavailable right now. Try Reload.</div>'; return; }
  const aov = w.ordCur? w.revCur/w.ordCur : 0;
  const aovPrev = w.ordPrev? w.revPrev/w.ordPrev : 0;
  const ch=channelTotals();
  const attrib = ch.email.rev+ch.sms.rev;
  const ref = (function(){const a=S.refundDay; if(!a||a.err) return 0; return sumWindow(a.dates,a.m.sum_value||[],WK_START,TODAY);})();
  el.innerHTML =
    '<div class="grid kpis">'
    + mkCard("Net Revenue", usd(w.revCur), deltaHtml(w.revCur,w.revPrev))
    + mkCard("Orders", num(w.ordCur), deltaHtml(w.ordCur,w.ordPrev))
    + mkCard("Avg Order Value", usd2(aov), deltaHtml(aov,aovPrev))
    + mkCard("Klaviyo-Attributed", usd(attrib), '<span class="sub flat">'+(w.revCur?pct(attrib/w.revCur):"–")+' of revenue</span>')
    + mkCard("Refunds", usd(ref), '<span class="sub flat">'+(w.revCur?pct(ref/w.revCur):"–")+' of revenue</span>')
    + '</div>'
    + '<div class="sec-title">Daily Revenue — This Week</div><div class="card"><div class="chart-box"><canvas id="ovRev"></canvas></div></div>'
    + '<div class="grid two" style="margin-top:14px">'
    +   '<div class="card"><div class="sec-title" style="margin-top:0">Email vs SMS Attributed Revenue</div><div class="chart-box short"><canvas id="ovChan"></canvas></div></div>'
    +   '<div class="card"><div class="sec-title" style="margin-top:0">Orders by Day</div><div class="chart-box short"><canvas id="ovOrd"></canvas></div></div>'
    + '</div>'
    + '<div class="src">Source: Klaviyo Placed Order &amp; Refunded Order metrics, campaign &amp; flow reports (last 7 days, Central time).</div>';
  // daily series this week
  const a=S.placedDay; const labels=[],rev=[],ord=[];
  for(let i=0;i<a.dates.length;i++){ const d=a.dates[i].slice(0,10); if(d>=WK_START&&d<TODAY){ labels.push(fmtNice(d)); rev.push(a.m.sum_value[i]||0); ord.push(a.m.count[i]||0);} }
  chart("ovRev",{type:"bar",data:{labels,datasets:[{label:"Revenue",data:rev,backgroundColor:"#b8893b",borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>"$"+v.toLocaleString()}}}}});
  chart("ovOrd",{type:"line",data:{labels,datasets:[{label:"Orders",data:ord,borderColor:"#5b8a72",backgroundColor:"rgba(91,138,114,.15)",fill:true,tension:.3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
  chart("ovChan",{type:"doughnut",data:{labels:["Email","SMS"],datasets:[{data:[ch.email.rev,ch.sms.rev],backgroundColor:["#3f6f9c","#5b8a72"]}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom"},tooltip:{callbacks:{label:c=>c.label+": "+usd(c.parsed)}}}}});
}

function renderChannels(){
  const el=document.getElementById("p-channels");
  if((!S.campaigns||S.campaigns.err)&&(!S.flows||S.flows.err)){ el.innerHTML='<div class="err">Channel data unavailable. Try Reload.</div>'; return; }
  const ch=channelTotals();
  const orr=o=>o.deliv?o.opens/o.deliv:0, clr=o=>o.deliv?o.clicks/o.deliv:0, cvr=o=>o.recip?o.conv/o.recip:0;
  el.innerHTML =
    '<div class="grid kpis">'
    + mkCard("Email Revenue", usd(ch.email.rev), '<span class="sub flat">'+num(ch.email.conv)+' orders</span>')
    + mkCard("SMS Revenue", usd(ch.sms.rev), '<span class="sub flat">'+num(ch.sms.conv)+' orders</span>')
    + mkCard("Email Open Rate", pct(orr(ch.email)), '<span class="sub flat">'+num(ch.email.recip)+' sent</span>')
    + mkCard("SMS Click Rate", pct(clr(ch.sms)), '<span class="sub flat">'+num(ch.sms.recip)+' sent</span>')
    + '</div>'
    + '<div class="sec-title">Channel Comparison</div><div class="card"><div class="chart-box"><canvas id="chCmp"></canvas></div></div>'
    + '<div class="sec-title">Top Flows by Attributed Revenue</div><div class="card" id="flowTbl"></div>'
    + '<div class="src">Source: Klaviyo campaign &amp; flow reports (last 7 days).</div>';
  chart("chCmp",{type:"bar",data:{labels:["Revenue","Orders","Recipients (÷10)"],
    datasets:[{label:"Email",data:[ch.email.rev,ch.email.conv,ch.email.recip/10],backgroundColor:"#3f6f9c",borderRadius:4},
              {label:"SMS",data:[ch.sms.rev,ch.sms.conv,ch.sms.recip/10],backgroundColor:"#5b8a72",borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom"}}}});
  // flow table
  let flows=[]; if(S.flows&&!S.flows.err){ const agg=S.flows.data.attributes.flow_aggregation||[];
    flows=agg.map(f=>({name:f.flow_details.attributes.name,rev:f.statistics.conversion_value||0,conv:f.statistics.conversions||0,
      open:f.statistics.open_rate||0,click:f.statistics.click_rate||0})).sort((a,b)=>b.rev-a.rev).slice(0,10); }
  let h='<table><thead><tr><th>Flow</th><th class="num">Revenue</th><th class="num">Orders</th><th class="num">Open</th><th class="num">Click</th></tr></thead><tbody>';
  if(!flows.length) h+='<tr><td colspan="5" class="empty-state">No flow activity in range.</td></tr>';
  flows.forEach(f=>{ h+='<tr><td>'+f.name+'</td><td class="num">'+usd(f.rev)+'</td><td class="num">'+num(f.conv)+'</td><td class="num">'+pct(f.open)+'</td><td class="num">'+pct(f.click)+'</td></tr>'; });
  h+='</tbody></table>'; document.getElementById("flowTbl").innerHTML=h;
}

function renderTiming(){
  const el=document.getElementById("p-timing");
  const a=S.placedHr;
  if(!a||a.err){ el.innerHTML='<div class="err">Timing data unavailable. Try Reload.</div>'; return; }
  const byHour=new Array(24).fill(0), byHourRev=new Array(24).fill(0);
  const dows=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]; const byDow=new Array(7).fill(0);
  const ord=a.m.count||[], rev=a.m.sum_value||[];
  for(let i=0;i<a.dates.length;i++){ const dt=new Date(a.dates[i]);
    const hr=parseInt(dt.toLocaleString("en-US",{timeZone:TZ,hour:"2-digit",hour12:false}))%24;
    const dw=new Date(dt.toLocaleString("en-US",{timeZone:TZ})).getDay();
    byHour[hr]+=ord[i]||0; byHourRev[hr]+=rev[i]||0; byDow[dw]+=ord[i]||0;
  }
  let peakH=0; byHour.forEach((v,i)=>{if(v>byHour[peakH])peakH=i;});
  let peakD=0; byDow.forEach((v,i)=>{if(v>byDow[peakD])peakD=i;});
  const fmtH=h=>{const ap=h<12?"am":"pm";let hh=h%12;if(hh===0)hh=12;return hh+ap;};
  el.innerHTML =
    '<div class="grid kpis">'
    + mkCard("Busiest Hour", fmtH(peakH)+"–"+fmtH((peakH+1)%24), '<span class="sub flat">'+num(byHour[peakH])+' orders</span>')
    + mkCard("Busiest Day", dows[peakD], '<span class="sub flat">'+num(byDow[peakD])+' orders</span>')
    + '</div>'
    + '<div class="sec-title">Orders by Hour of Day</div><div class="card"><div class="chart-box"><canvas id="tHr"></canvas></div></div>'
    + '<div class="sec-title">Orders by Day of Week</div><div class="card"><div class="chart-box short"><canvas id="tDow"></canvas></div></div>'
    + '<div class="src">Source: Klaviyo Placed Order metric, hourly buckets (last 7 days, Central time).</div>';
  chart("tHr",{type:"bar",data:{labels:byHour.map((_,i)=>fmtH(i)),datasets:[{label:"Orders",data:byHour,backgroundColor:"#b8893b",borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxRotation:0,autoSkip:true,maxTicksLimit:12}}}}});
  chart("tDow",{type:"bar",data:{labels:dows,datasets:[{label:"Orders",data:byDow,backgroundColor:"#5b8a72",borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
}

function renderReturns(){
  const el=document.getElementById("p-returns");
  const a=S.refundDay; const p=S.placedDay;
  if(!a||a.err){ el.innerHTML='<div class="err">Returns data unavailable. Try Reload.</div>'; return; }
  const rCur=sumWindow(a.dates,a.m.sum_value||[],WK_START,TODAY), rPrev=sumWindow(a.dates,a.m.sum_value||[],PREV_START,WK_START);
  const cCur=sumWindow(a.dates,a.m.count||[],WK_START,TODAY), cPrev=sumWindow(a.dates,a.m.count||[],PREV_START,WK_START);
  let revCur=0,ordCur=0; if(p&&!p.err){ revCur=sumWindow(p.dates,p.m.sum_value||[],WK_START,TODAY); ordCur=sumWindow(p.dates,p.m.count||[],WK_START,TODAY);}
  const rateV=revCur?rCur/revCur:0;
  el.innerHTML =
    '<div class="grid kpis">'
    + mkCard("Refund Value", usd(rCur), deltaHtml(rCur,rPrev))
    + mkCard("Refunded Orders", num(cCur), deltaHtml(cCur,cPrev))
    + mkCard("Refund Rate", pct(rateV), '<span class="sub flat">of revenue</span>')
    + mkCard("Order Refund %", ordCur?pct(cCur/ordCur):"–", '<span class="sub flat">of '+num(ordCur)+' orders</span>')
    + '</div>'
    + '<div class="sec-title">Daily Refund Value — Two-Week View</div><div class="card"><div class="chart-box"><canvas id="rTrend"></canvas></div></div>'
    + '<div class="src">Source: Klaviyo Refunded Order metric (last 14 days, Central time).</div>';
  const labels=[],vals=[]; for(let i=0;i<a.dates.length;i++){ const d=a.dates[i].slice(0,10); if(d>=PREV_START&&d<TODAY){ labels.push(fmtNice(d)); vals.push(a.m.sum_value[i]||0);} }
  chart("rTrend",{type:"line",data:{labels,datasets:[{label:"Refunds",data:vals,borderColor:"#c0492f",backgroundColor:"rgba(192,73,47,.12)",fill:true,tension:.3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>"$"+v.toLocaleString()}}}}});
}

function renderCustomers(){
  const el=document.getElementById("p-customers");
  const e=S.emailSub, s=S.smsSub;
  const eCur=(e&&!e.err)?sumWindow(e.dates,e.m.count||[],WK_START,TODAY):0;
  const ePrev=(e&&!e.err)?sumWindow(e.dates,e.m.count||[],PREV_START,WK_START):0;
  const sCur=(s&&!s.err)?sumWindow(s.dates,s.m.count||[],WK_START,TODAY):0;
  const sPrev=(s&&!s.err)?sumWindow(s.dates,s.m.count||[],PREV_START,WK_START):0;
  el.innerHTML =
    '<div class="note"><b>Note:</b> New-vs-returning customer split and per-customer LTV require order-level detail that the Shopify connector can\'t filter to a single week. The metrics below track <b>list growth</b> (new subscribers) as the weekly acquisition signal. Connect a Shopify reporting/analytics source to unlock true new-vs-returning and LTV.</div>'
    + '<div class="grid kpis">'
    + mkCard("New Email Subscribers", num(eCur), deltaHtml(eCur,ePrev))
    + mkCard("New SMS Subscribers", num(sCur), deltaHtml(sCur,sPrev))
    + mkCard("Total New Contacts", num(eCur+sCur), deltaHtml(eCur+sCur,ePrev+sPrev))
    + '</div>'
    + '<div class="sec-title">New Subscribers — Daily (Two-Week View)</div><div class="card"><div class="chart-box"><canvas id="cSub"></canvas></div></div>'
    + '<div class="src">Source: Klaviyo Subscribed to Email / SMS Marketing metrics (last 14 days, Central time).</div>';
  if((!e||e.err)&&(!s||s.err)){ document.getElementById("p-customers").querySelector(".card").innerHTML='<div class="err">Subscriber data unavailable.</div>'; return; }
  const base=(e&&!e.err)?e:s; const labels=[],em=[],sm=[];
  for(let i=0;i<base.dates.length;i++){ const d=base.dates[i].slice(0,10); if(d>=PREV_START&&d<TODAY){ labels.push(fmtNice(d));
    em.push((e&&!e.err&&e.m.count)?(e.m.count[i]||0):0); sm.push((s&&!s.err&&s.m.count)?(s.m.count[i]||0):0); } }
  chart("cSub",{type:"bar",data:{labels,datasets:[
      {label:"Email",data:em,backgroundColor:"#3f6f9c",borderRadius:3,stack:"a"},
      {label:"SMS",data:sm,backgroundColor:"#5b8a72",borderRadius:3,stack:"a"}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom"}},scales:{x:{stacked:true},y:{stacked:true}}}});
}

function renderProducts(){
  const el=document.getElementById("p-products");
  const pr=S.products;
  if(!pr||pr.err||!pr.products){ el.innerHTML='<div class="err">Catalog data unavailable. Try Reload.</div>'; return; }
  const items=pr.products.filter(p=>p.status==="ACTIVE");
  // inventory health
  let oos=0,low=0; items.forEach(p=>{ const inv=p.totalInventory; if(inv<=0)oos++; else if(inv<10)low++; });
  el.innerHTML =
    '<div class="note"><b>Note:</b> Per-product <b>weekly sales</b> need order line-item detail the connector can\'t date-filter, so this is a <b>current catalog &amp; inventory snapshot</b>. Connect a Shopify reporting source to add weekly best-sellers here.</div>'
    + '<div class="grid kpis">'
    + mkCard("Active Products", num(items.length), "")
    + mkCard("Out of Stock", num(oos), '<span class="sub '+(oos?"down":"flat")+'">tracked inventory ≤ 0</span>')
    + mkCard("Low Stock", num(low), '<span class="sub '+(low?"down":"flat")+'">under 10 units</span>')
    + '</div>'
    + '<div class="sec-title">Catalog Snapshot</div><div class="card" id="prodTbl"></div>'
    + '<div class="src">Source: Shopify product catalog (live).</div>';
  const sorted=items.slice().sort((a,b)=>(a.totalInventory)-(b.totalInventory));
  let h='<table><thead><tr><th>Product</th><th class="num">Price</th><th class="num">Inventory</th><th>Status</th></tr></thead><tbody>';
  sorted.slice(0,40).forEach(p=>{ const price=p.priceRange&&p.priceRange.minPrice?Number(p.priceRange.minPrice.amount):0;
    const inv=p.totalInventory; const st=inv<=0?'<span class="pill low">Out</span>':(inv<10?'<span class="pill low">Low</span>':'<span class="pill ok">OK</span>');
    h+='<tr><td>'+p.title+'</td><td class="num">'+usd2(price)+'</td><td class="num">'+num(inv)+'</td><td>'+st+'</td></tr>'; });
  h+='</tbody></table>'; document.getElementById("prodTbl").innerHTML=h;
}

/* ---------- tab switching ---------- */
const RENDER={overview:renderOverview,customers:renderCustomers,channels:renderChannels,products:renderProducts,
  geography:renderGeography,timing:renderTiming,returns:renderReturns,survey:renderSurvey};
function renderTab(name){
  if(name==="geography"){ renderGeography(); return; }
  if(name==="survey"){ renderSurvey(); return; }
  if(built[name]) return; // data-backed tabs render once
  if(Object.keys(S).length===0) return; // not loaded yet
  RENDER[name](); built[name]=true;
}
document.getElementById("tabs").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return; const tab=b.dataset.tab;
  document.querySelectorAll("#tabs button").forEach(x=>x.classList.toggle("active",x===b));
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  document.getElementById("p-"+tab).classList.add("active");
  renderTab(tab);
});

/* static tabs can render immediately */
renderGeography(); renderSurvey();
initStatic();
</script>
